spring.application.name=PrestamosBancarios

# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/prestamos_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
jwt.secret=d2hhdGV2ZXJ5bG9uZ3lvdXdhbnR0b2RvZXNpcXVhbHRvMjU2Yml0cw==
jwt.expiration=86400000

# OpenAPI / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Logging Configuration
logging.file.name=logs/application.log
logging.level.com.Sistema.PrestamosBancarios=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
